name: 'Builds LLVM'
description: 'This action builds LLVM'
inputs:
  cache-hit:
    required: true

runs:
  using: composite
  steps:
    - name: Build LLVM/Cling if the cache is invalid
      if: ${{ inputs.cache-hit != 'true'  && runner.os != 'Windows' && matrix.wasm != true }}
      shell: bash
      run: |
        cling_on=$(echo "${{ matrix.cling }}" | tr '[:lower:]' '[:upper:]')
        if [[ "${cling_on}" == "ON" ]]; then
          git clone --depth=1 --branch v${{ matrix.cling-version || env.CLING_VERSION }} https://github.com/root-project/cling.git
          git clone --depth=1 -b ${{ matrix.root-llvm-tag }} https://github.com/root-project/llvm-project.git
        else # repl
          git clone --depth=1 -b release/${{ matrix.clang-runtime }}.x https://github.com/llvm/llvm-project.git
        fi
        cd llvm-project
        # Build
        mkdir build
        if [[ "${cling_on}" == "ON" ]]; then
          cd build
          cmake -DLLVM_ENABLE_PROJECTS="clang" \
                -DLLVM_EXTERNAL_PROJECTS=cling                     \
                -DLLVM_EXTERNAL_CLING_SOURCE_DIR=../../cling       \
                -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets_to_build || 'host;NVPTX' }}" \
                -DCMAKE_BUILD_TYPE=Release                         \
                -DLLVM_ENABLE_ASSERTIONS=ON                        \
                -DCLANG_ENABLE_STATIC_ANALYZER=OFF                 \
                -DCLANG_ENABLE_ARCMT=OFF                           \
                -DCLANG_ENABLE_FORMAT=OFF                          \
                -DCLANG_ENABLE_BOOTSTRAP=OFF                       \
                -G Ninja                                           \
                ../llvm
          ninja clang -j ${{ env.ncpus }}
          ninja LLVMOrcDebugging -j ${{ env.ncpus }}
          ninja clingInterpreter -j ${{ env.ncpus }}
        else
          # Non-cling, LLVM >= 22: bundle the OOP-JIT runtime into the
          # cache. compiler-rt is enabled with everything except the
          # ORC runtime turned off so the build stays cheap.
          NEED_OOP=0
          if [[ "${{ matrix.clang-runtime }}" -ge 22 ]]; then
            NEED_OOP=1
          fi
          if [[ "${NEED_OOP}" == "1" ]]; then
            PROJECTS="clang;compiler-rt"
            COMPILER_RT_FLAGS=(
              -DCOMPILER_RT_BUILD_BUILTINS=OFF
              -DCOMPILER_RT_BUILD_LIBFUZZER=OFF
              -DCOMPILER_RT_BUILD_PROFILE=OFF
              -DCOMPILER_RT_BUILD_MEMPROF=OFF
              -DCOMPILER_RT_BUILD_SANITIZERS=OFF
              -DCOMPILER_RT_BUILD_XRAY=OFF
              -DCOMPILER_RT_BUILD_GWP_ASAN=OFF
              -DCOMPILER_RT_BUILD_CTX_PROFILE=OFF
            )
          else
            PROJECTS="clang"
            COMPILER_RT_FLAGS=()
          fi

          cd build
          cmake -DLLVM_ENABLE_PROJECTS="${PROJECTS}" \
                -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets_to_build || 'host;NVPTX' }}"  \
                -DCMAKE_BUILD_TYPE=Release                          \
                -DLLVM_ENABLE_ASSERTIONS=ON                         \
                -DCLANG_ENABLE_STATIC_ANALYZER=OFF                  \
                -DCLANG_ENABLE_ARCMT=OFF                            \
                -DCLANG_ENABLE_FORMAT=OFF                           \
                -DCLANG_ENABLE_BOOTSTRAP=OFF                        \
                -G Ninja                                            \
                -DLLVM_INCLUDE_BENCHMARKS=OFF                   \
                -DLLVM_USE_SANITIZER="${{ matrix.sanitizer }}"  \
                -DLLVM_INCLUDE_EXAMPLES=OFF                     \
                -DLLVM_INCLUDE_TESTS=OFF                        \
                "${COMPILER_RT_FLAGS[@]}" \
                ../llvm
          ninja clang clangInterpreter clangStaticAnalyzerCore
          if [[ "${NEED_OOP}" == "1" ]]; then
            # orc_rt's per-target ninja target name varies; find it by
            # asking ninja for everything matching `orc_rt*`. Building
            # the executor unconditionally is safe -- it's always a
            # valid target when compiler-rt is in the build.
            OOP_TARGETS=$(ninja -t targets all 2>/dev/null | \
              awk -F: '/^orc_rt[^:]*:/{print $1}' | sort -u | tr '\n' ' ')
            ninja llvm-jitlink-executor ${OOP_TARGETS} -j ${{ env.ncpus }}
          fi
          cd ./tools/
          rm -rf $(find . -maxdepth 1 ! -name "clang" ! -name ".")
          cd ..
          rm compile_commands.json build.ninja
        fi
        cd ../
        rm -rf $(find . -maxdepth 1 ! -name "build" ! -name "llvm" ! -name "clang" ! -name ".")
        if [[ "${cling_on}" == "ON" ]]; then
          cd ./llvm/
          rm -rf $(find . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name "utils" ! -name ".")
          cd ../clang/
          rm -rf $(find . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name "utils" ! -name ".")
          cd ../../cling/
          rm -rf $(find . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name ".")
        else # repl
          cd ./llvm/
          rm -rf $(find . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name ".")
          cd ../clang/
          rm -rf $(find . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name ".")
          cd ../..
        fi


    - name: Build LLVM/Cling on Windows systems if the cache is invalid
      if: ${{ inputs.cache-hit != 'true'  && runner.os == 'Windows' && matrix.wasm != true }}
      shell: powershell
      run: |

        if ( "${{ matrix.cling }}" -imatch "On" )
        {
          git clone --depth=1 --branch v${{ matrix.cling-version || env.CLING_VERSION }} https://github.com/root-project/cling.git
          git clone --depth=1 -b ${{ matrix.root-llvm-tag }} https://github.com/root-project/llvm-project.git
          $env:PWD_DIR= $PWD.Path
          $env:CLING_DIR="$env:PWD_DIR\cling"
          echo "CLING_DIR=$env:CLING_DIR"
        }
        else
        {
          git clone --depth=1 -b release/${{ matrix.clang-runtime }}.x https://github.com/llvm/llvm-project.git
        }

        cd llvm-project
        # Build
        mkdir build
        if ( "${{ matrix.cling }}" -imatch "On" )
        {
          cd build
          cmake -DLLVM_ENABLE_PROJECTS="clang" `
                -DLLVM_EXTERNAL_PROJECTS=cling                `
                -DLLVM_EXTERNAL_CLING_SOURCE_DIR="$env:CLING_DIR"   `
                -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets_to_build || 'host;NVPTX' }}" `
                -DCMAKE_BUILD_TYPE=Release                         `
                -DLLVM_ENABLE_ASSERTIONS=ON                        `
                -DCLANG_ENABLE_STATIC_ANALYZER=OFF                 `
                -DCLANG_ENABLE_ARCMT=OFF                           `
                -DCLANG_ENABLE_FORMAT=OFF                          `
                -DCLANG_ENABLE_BOOTSTRAP=OFF                       `
                ..\llvm
          cmake --build . --config Release --target clang --parallel ${{ env.ncpus }}
          cmake --build . --config Release --target LLVMOrcDebugging --parallel ${{ env.ncpus }}
          cmake --build . --config Release --target clingInterpreter --parallel ${{ env.ncpus }}
        }
        else
        {
          cd build
          echo "Apply clang${{ matrix.clang-runtime }}-*.patch patches:"
          cmake -DLLVM_ENABLE_PROJECTS="clang"                   `
                -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets_to_build || 'host;NVPTX' }}"          `
                -DCMAKE_BUILD_TYPE=Release                          `
                -DLLVM_ENABLE_ASSERTIONS=ON                         `
                -DCLANG_ENABLE_STATIC_ANALYZER=OFF                  `
                -DCLANG_ENABLE_ARCMT=OFF                            `
                -DCLANG_ENABLE_FORMAT=OFF                           `
                -DCLANG_ENABLE_BOOTSTRAP=OFF                        `
                ..\llvm
          cmake --build . --config Release --target clang clangInterpreter clangStaticAnalyzerCore --parallel ${{ env.ncpus }}
        }
        cd ..\
        rm -r -force $(find.exe . -maxdepth 1 ! -name "build" ! -name "llvm" ! -name "clang" ! -name ".")
        if ( "${{ matrix.cling }}" -imatch "On" )
        {
          cd .\llvm\
          rm -r -force $(find.exe . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name "utils" ! -name ".")
          cd ..\clang\
          rm -r -force $(find.exe . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name "utils" ! -name ".")
          cd ..\..\cling\
          rm -r -force $(find.exe . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name ".")
        }
        else
        {
          cd .\llvm\
          rm -r -force $(find.exe . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake" ! -name ".")
          cd ..\clang\
          rm -r -force $(find.exe . -maxdepth 1 ! -name "include" ! -name "lib" ! -name "cmake"  ! -name ".")
          cd ..\..
        }

    - name: Build LLVM/Cling on Unix systems if the cache is invalid (emscripten)
      if: ${{ inputs.cache-hit != 'true' && runner.os != 'Windows' && matrix.wasm == true }}
      shell: bash
      run: |
        ./emsdk/emsdk activate ${{ env.EMSDK_VER }}
        source ./emsdk/emsdk_env.sh
        git clone --depth=1 -b release/${{ matrix.clang-runtime }}.x https://github.com/llvm/llvm-project.git
        cd llvm-project

        # Native tblgen bootstrap (host-side llvm-tblgen + clang-tblgen).
        mkdir native_build
        (cd native_build && \
            cmake -DLLVM_ENABLE_PROJECTS=clang -DLLVM_TARGETS_TO_BUILD=host -DCMAKE_BUILD_TYPE=Release ../llvm/ && \
            cmake --build . --target llvm-tblgen clang-tblgen --parallel $(nproc --all))
        export NATIVE_DIR=$PWD/native_build/bin/

        rt='${{ matrix.clang-runtime }}'
        if [[ "$rt" =~ ^(19|20|21|22)$ ]]; then
          git apply -v ../patches/llvm/emscripten-clang${rt}-*.patch
          echo "Applied emscripten-clang${rt}-*.patch"
        fi

        cmake_flags=(
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLLVM_HOST_TRIPLE=wasm32-unknown-emscripten
          -DLLVM_TARGETS_TO_BUILD="${{ env.LLVM_TARGETS_TO_BUILD }}"
          -DLLVM_ENABLE_PROJECTS="${{ env.LLVM_ENABLE_PROJECTS }}"
          -DLLVM_NATIVE_TOOL_DIR="$NATIVE_DIR"
          -DLLVM_ENABLE_LIBEDIT=OFF
          -DLLVM_ENABLE_ZSTD=OFF
          -DLLVM_ENABLE_LIBXML2=OFF
          -DLLVM_ENABLE_LIBPFM=OFF
          -DLLVM_ENABLE_THREADS=OFF
          -DLLVM_INCLUDE_BENCHMARKS=OFF
          -DLLVM_INCLUDE_EXAMPLES=OFF
          -DLLVM_INCLUDE_TESTS=OFF
          -DLLVM_BUILD_TOOLS=OFF
          -DCLANG_BUILD_TOOLS=OFF
          -DCLANG_ENABLE_STATIC_ANALYZER=OFF
          -DCLANG_ENABLE_ARCMT=OFF
          -DCLANG_ENABLE_BOOTSTRAP=OFF
          -DCMAKE_CXX_FLAGS=-Dwait4=__syscall_wait4
          "-DCMAKE_C_FLAGS_RELEASE=-Oz -g0 -DNDEBUG"
          "-DCMAKE_CXX_FLAGS_RELEASE=-Oz -g0 -DNDEBUG"
          -DLLVM_ENABLE_LTO=Full
        )

        targets=(libclang clangInterpreter clangStaticAnalyzerCore)

        mkdir build && cd build
        emcmake cmake "${cmake_flags[@]}"  ../llvm
        EMCC_CFLAGS="-fwasm-exceptions" emmake ninja "${targets[@]}"
        cd ..

        # Trim source trees so the cache stays small.
        rm -rf $(find . -maxdepth 1 ! -name "build" ! -name "llvm" ! -name "clang" ! -name "." ! -name "native_build")
        keep=('!' -name include '!' -name lib '!' -name cmake '!' -name .)
        for d in llvm clang; do
          (cd "$d" && rm -rf $(find . -maxdepth 1 "${keep[@]}"))
        done


    - name: Build LLVM/Cling on Windows systems if the cache is invalid (emscripten)
      if: ${{ inputs.cache-hit != 'true' && runner.os == 'Windows' && matrix.wasm == true }}
      shell: powershell
      run: |
        .\emsdk\emsdk activate ${{ env.EMSDK_VER }}
        .\emsdk\emsdk_env.ps1

        git clone --depth=1 -b release/${{ matrix.clang-runtime }}.x https://github.com/llvm/llvm-project.git

        cd llvm-project

        # Native tblgen bootstrap (host-side llvm-tblgen + clang-tblgen).
        mkdir native_build | Out-Null
        Push-Location native_build
        cmake -DLLVM_ENABLE_PROJECTS=clang -DLLVM_TARGETS_TO_BUILD=host -DCMAKE_BUILD_TYPE=Release -G Ninja ../llvm/
        cmake --build . --target llvm-tblgen clang-tblgen --parallel $(nproc --all)
        $env:NATIVE_DIR = Join-Path $PWD.Path "bin"
        Pop-Location

        $rt = "${{ matrix.clang-runtime }}"
        if ( $rt -match "^(19|20|21|22)$" ) {
          Get-ChildItem -Path "..\patches\llvm" -Filter "emscripten-clang${rt}-*.patch" | ForEach-Object {
            git apply -v $_.FullName
          }
          echo "Applied emscripten-clang${rt}-*.patch"
        }

        $cmake_flags = @(
          "-G", "Ninja"
          "-DCMAKE_BUILD_TYPE=Release"
          "-DLLVM_HOST_TRIPLE=wasm32-unknown-emscripten"
          "-DLLVM_TARGETS_TO_BUILD=${{ env.LLVM_TARGETS_TO_BUILD }}"
          "-DLLVM_ENABLE_PROJECTS=${{ env.LLVM_ENABLE_PROJECTS }}"
          "-DLLVM_NATIVE_TOOL_DIR=$env:NATIVE_DIR"
          "-DLLVM_ENABLE_LIBEDIT=OFF"
          "-DLLVM_ENABLE_ZSTD=OFF"
          "-DLLVM_ENABLE_LIBXML2=OFF"
          "-DLLVM_ENABLE_LIBPFM=OFF"
          "-DLLVM_ENABLE_THREADS=OFF"
          "-DLLVM_INCLUDE_BENCHMARKS=OFF"
          "-DLLVM_INCLUDE_EXAMPLES=OFF"
          "-DLLVM_INCLUDE_TESTS=OFF"
          "-DLLVM_BUILD_TOOLS=OFF"
          "-DCLANG_BUILD_TOOLS=OFF"
          "-DCLANG_ENABLE_STATIC_ANALYZER=OFF"
          "-DCLANG_ENABLE_ARCMT=OFF"
          "-DCLANG_ENABLE_BOOTSTRAP=OFF"
          "-DCMAKE_CXX_FLAGS=-Dwait4=__syscall_wait4"
          "-DCMAKE_C_FLAGS_RELEASE=-Oz -g0 -DNDEBUG"
          "-DCMAKE_CXX_FLAGS_RELEASE=-Oz -g0 -DNDEBUG"
          "-DLLVM_ENABLE_LTO=Full"
        )
        $targets = @("libclang", "clangInterpreter", "clangStaticAnalyzerCore")

        mkdir build | Out-Null
        cd build
        emcmake cmake @cmake_flags ..\llvm
        $env:EMCC_CFLAGS = "-fwasm-exceptions"
        emmake ninja @targets
        $env:EMCC_CFLAGS = ""
        cd ..

        # Trim source trees so the cache stays small.
        rm -r -force $(find.exe . -maxdepth 1 ! -name "build" ! -name "llvm" ! -name "clang" ! -name "." ! -name "native_build")
        $keep = @("!", "-name", "include", "!", "-name", "lib", "!", "-name", "cmake", "!", "-name", ".")
        foreach ($d in @("llvm", "clang")) {
          Push-Location $d
          rm -r -force $(find.exe . -maxdepth 1 @keep)
          Pop-Location
        }
