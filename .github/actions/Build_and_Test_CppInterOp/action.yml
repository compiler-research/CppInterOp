name: 'Builds and test CppInterOp'
description: 'This action builds and tests CppInterOp for native platforms'

# `${{ matrix.* }}` doesn't reach composite-action expressions under
# nektos/act; github-hosted runners propagate it. Forward via inputs
# (same pattern as Setup_Compiler / Build_and_Test_cppyy post #957).
inputs:
  cling:
    required: false
    default: ''
    description: 'matrix.cling. Gates the find_package(Cling) cmake branch.'
  clang_runtime:
    required: true
    description: 'matrix.clang-runtime. /usr/lib/llvm-N paths + source-side fixture gates.'
  documentation:
    required: false
    default: ''
    description: 'matrix.documentation. Selects docs vs check-cppinterop targets.'
  sanitizer:
    required: false
    default: ''
    description: 'matrix.sanitizer. Forwarded to LLVM_USE_SANITIZER.'
  valgrind:
    required: false
    default: ''
    description: 'matrix.Valgrind. Gates the in-process valgrind run.'
  wasm:
    required: false
    default: 'false'
    description: 'matrix.wasm. Gates emscripten cross-build vs native steps.'

runs:
  using: composite
  steps:
    - name: Build and Test/Install CppInterOp (native shared library build)
      if: ${{ runner.os != 'Windows' && inputs.wasm != 'true' }}
      shell: bash
      run: |
        if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
          LLVM_PREFIX="/usr/lib/llvm-${{ inputs.clang_runtime }}"
        else
          # setup-llvm exports $LLVM_DIR (cmake-config dir, three levels
          # deep); every matrix row goes through setup-llvm so a missing
          # $LLVM_DIR is a CI setup bug, not a fall-back case.
          LLVM_PREFIX="$(dirname "$(dirname "$(dirname "$LLVM_DIR")")")"
        fi
        LLVM_BUILD_DIR="$LLVM_PREFIX"
        cling_on=$(echo "${{ inputs.cling }}" | tr '[:lower:]' '[:upper:]')
        if [[ "${cling_on}" == "ON" ]]; then
          # Cling rides setup-llvm's `flavor: cling`: llvm-root recipe +
          # cling built on top, both shipped under $LLVM_PREFIX/.
          CLING_DIR="$LLVM_PREFIX"
          CLING_CMAKE_DIR="$LLVM_PREFIX/lib/cmake/cling"
        fi

        export CB_PYTHON_DIR="$PWD/cppyy-backend/python"
        export CPPINTEROP_DIR="$CB_PYTHON_DIR/cppyy_backend"

        # `rm -rf build` guards against a stale build/ from a prior run --
        # github-hosted runners start with an empty workspace, but
        # local reproductions via nektos/act reuse the host workspace
        # (or a persisted container's overlay) where build/ may
        # already exist; `mkdir build` would otherwise fail with
        # "File exists" under set -e.
        rm -rf build && mkdir build && cd build
        export CPPINTEROP_BUILD_DIR=$PWD
        cling_on=$(echo "${{ inputs.cling }}" | tr '[:lower:]' '[:upper:]')
        # Propagate matrix.sanitizer to CppInterOp's cmake. CppInterOp's
        # CMakeLists tried to recover this from the LLVM build's
        # CMakeCache.txt via load_cache(); install trees don't ship
        # CMakeCache.txt (it's build state, not install state), so on
        # the recipe-cached path CppInterOp would compile without
        # -fsanitize=address while libLLVMSupport.a is asan-instrumented,
        # leaving __asan_* symbols unresolved at link.
        # -GNinja: outer cmake uses Ninja, ExternalProject inherits
        # the generator (so googletest's inner build is also Ninja).
        # Sidesteps the make->cmake->make recursive jobserver fd
        # inheritance that breaks under nektos/act's bash invocation
        # ("gmake[5]: *** write jobserver: Bad file descriptor").
        # ninja-build is in Install_Dependencies' apt list (github-
        # hosted + act); the self-hosted apt step in main.yml /
        # root.yml installs it explicitly. The adjacent fix to
        # cmake/modules/GoogleTest.cmake (correcting BUILD_BYPRODUCTS
        # to point at the real binary_dir) is what makes Ninja's
        # strict missing-rule semantics work for the
        # ExternalProject_Add output.
        if [[ "${cling_on}" == "ON" ]]; then
          cmake -GNinja                                     \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}        \
                -DCPPINTEROP_USE_CLING=ON                                  \
                -DCPPINTEROP_USE_REPL=OFF                                  \
                -DCPPINTEROP_INCLUDE_DOCS=${{ inputs.documentation }} \
                -DCling_DIR=$CLING_CMAKE_DIR                    \
                -DLLVM_DIR=$LLVM_BUILD_DIR/lib/cmake/llvm       \
                -DClang_DIR=$LLVM_BUILD_DIR/lib/cmake/clang     \
                -DLLVM_USE_SANITIZER="${{ inputs.sanitizer }}"  \
                -DBUILD_SHARED_LIBS=ON                          \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}        \
                -DCMAKE_INSTALL_PREFIX=$CPPINTEROP_DIR          \
                -DLLVM_ENABLE_WERROR=On                         \
                ../
        else
          cmake -GNinja                                  \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}     \
                -DCPPINTEROP_INCLUDE_DOCS=${{ inputs.documentation }} \
                -DLLVM_DIR=$LLVM_BUILD_DIR/lib/cmake/llvm    \
                -DClang_DIR=$LLVM_BUILD_DIR/lib/cmake/clang  \
                -DLLVM_USE_SANITIZER="${{ inputs.sanitizer }}" \
                -DBUILD_SHARED_LIBS=ON                       \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}     \
                -DCMAKE_INSTALL_PREFIX=$CPPINTEROP_DIR       \
                -DLLVM_ENABLE_WERROR=On                      \
                ../
        fi
        docs_on=$(echo "${{ inputs.documentation }}" | tr '[:lower:]' '[:upper:]')
        if [[ "${docs_on}" == "ON" ]]; then
          cmake --build . --target doxygen-cppinterop --parallel ${{ env.ncpus }}
          cmake --build . --target sphinx-cppinterop --parallel ${{ env.ncpus }}
        else
          if [[ "${{ runner.os }}" == "macOS" && -n "${CODE_COVERAGE:-}" ]]; then
            # Run without SDKROOT so CreateInterpreter's fallback detection executes
            unset SDKROOT
          fi
          cmake --build . --target check-cppinterop --parallel ${{ env.ncpus }}
          # Verify the source-side `LLVM_VERSION_MAJOR > 21 &&
          # !defined(_WIN32)` gate in unittests/CppInterOp/Utils.h:
          # `InProcessJIT` always registers; `OutOfProcessJIT` must
          # not register on clang-runtime <= 21. Missing OOP fixture
          # on clang-runtime >= 22 is currently allowed (transitional;
          # tighten to required once every cache row is rebuilt with
          # compiler-rt).
          TESTS_BIN=unittests/CppInterOp/bin/${{ env.BUILD_TYPE }}/CppInterOpTests
          if [[ -x "${TESTS_BIN}" ]]; then
            FIXTURES=$("${TESTS_BIN}" --gtest_list_tests 2>/dev/null | \
              grep '^CppInterOpTest/' || true)
            if ! echo "${FIXTURES}" | grep -q '^CppInterOpTest/InProcessJIT'; then
              echo "FAIL: InProcessJIT fixture missing -- typed-test setup broken"
              exit 1
            fi
            if [[ "${{ inputs.clang_runtime }}" -lt 22 ]]; then
              if echo "${FIXTURES}" | grep -q '^CppInterOpTest/OutOfProcessJIT'; then
                echo "FAIL: OutOfProcessJIT fixture registered on clang-runtime=${{ inputs.clang_runtime }}; LLVM_VERSION_MAJOR>21 source gate broken"
                exit 1
              fi
            fi
          fi
          # Install-layout smoke test: install into a scratch prefix
          # and assert the bundled runtime parts ship to
          # `<libdir>/cppinterop-rt/` with the right modes. Catches
          # install(FILES/PROGRAMS) destination/exec-bit regressions
          # the in-tree path doesn't see.
          INSTALL_DIR="${RUNNER_TEMP:-/tmp}/cppinterop-install-check"
          rm -rf "${INSTALL_DIR}"
          cmake --install . --prefix "${INSTALL_DIR}" >/dev/null
          ls "${INSTALL_DIR}"/lib/libclangCppInterOp.* >/dev/null 2>&1 || \
            { echo "FAIL: libclangCppInterOp not installed"; exit 1; }
          if [[ -d "${INSTALL_DIR}/lib/cppinterop-rt" ]]; then
            test -f "${INSTALL_DIR}/lib/cppinterop-rt/liborc_rt.a" || \
              { echo "FAIL: liborc_rt.a missing from install"; exit 1; }
            test -x "${INSTALL_DIR}/lib/cppinterop-rt/llvm-jitlink-executor" || \
              { echo "FAIL: llvm-jitlink-executor missing or not executable"; exit 1; }
            echo "OK: bundled OOP runtime installed under lib/cppinterop-rt/"

            # Probe-chain validation: relocate the install and override
            # CPPINTEROP_RUNTIME_DIR. Both must keep the bundled runtime
            # discoverable -- assert no fallback warning fires.
            RELOC_MOVED="${INSTALL_DIR}-moved"
            rm -rf "${RELOC_MOVED}"
            mv "${INSTALL_DIR}" "${RELOC_MOVED}"
            LIB_KEY=LD_LIBRARY_PATH
            [[ "$(uname)" == "Darwin" ]] && LIB_KEY=DYLD_LIBRARY_PATH
            OOP_FILTER='CppInterOpTest/OutOfProcessJIT.*'
            assert_no_fallback() {
              local desc="$1" log="$2"
              if echo "${log}" | grep -q "bundled OOP runtime.*is missing"; then
                echo "FAIL: ${desc} -- OOP fallback warning fired"
                echo "${log}" | tail -10
                exit 1
              fi
              echo "OK: ${desc}"
            }
            # 1. dladdr probe finds runtime alongside the moved .so.
            out=$(env "${LIB_KEY}=${RELOC_MOVED}/lib" \
                  "${TESTS_BIN}" --gtest_filter="${OOP_FILTER}" 2>&1) || true
            assert_no_fallback "dladdr probe survives install relocation" "${out}"
            # 2. CPPINTEROP_RUNTIME_DIR override: stage runtime at a third
            #    location, wipe the bundled subdir, point the env-var at
            #    the staged copy.
            ENV_RT="${RUNNER_TEMP:-/tmp}/cppinterop-rt-env"
            rm -rf "${ENV_RT}"; mkdir -p "${ENV_RT}"
            cp "${RELOC_MOVED}/lib/cppinterop-rt/liborc_rt.a" "${ENV_RT}/"
            cp "${RELOC_MOVED}/lib/cppinterop-rt/llvm-jitlink-executor" "${ENV_RT}/"
            rm -rf "${RELOC_MOVED}/lib/cppinterop-rt"
            out=$(env "${LIB_KEY}=${RELOC_MOVED}/lib" \
                      "CPPINTEROP_RUNTIME_DIR=${ENV_RT}" \
                  "${TESTS_BIN}" --gtest_filter="${OOP_FILTER}" 2>&1) || true
            assert_no_fallback "CPPINTEROP_RUNTIME_DIR env-var override" "${out}"
          elif [[ "${{ inputs.clang_runtime }}" -lt 22 ]]; then
            echo "OK: lib/cppinterop-rt/ absent, expected for clang-runtime <= 21"
          else
            echo "INFO: lib/cppinterop-rt/ absent on clang-runtime=${{ inputs.clang_runtime }} (transitional cache row without compiler-rt)"
          fi
          if [[ "${{ runner.os }}" != "macOS" && "${{ inputs.valgrind }}" == "On" ]]; then
            CLANG_VERSION="${{ inputs.clang_runtime }}"
            # Per-major suppression file. Loaded when present; absent
            # files mean "no suppressions for this major" (valgrind runs
            # bare). Tracks llvm/llvm-project#194147 in clang-21 and
            # clang-22 today; older majors don't need a file because
            # they pre-date the regression. The OOP-JIT noise (fork/
            # exec/pipes) suppression that LLVM 22+ uniquely needs
            # also lives in the per-major file.
            SUPPRESSION_FILE="../etc/clang${CLANG_VERSION}-valgrind.supp"
            if [[ -f "${SUPPRESSION_FILE}" ]]; then
              valgrind --show-error-list=yes --track-origins=yes --error-exitcode=1 \
                --show-leak-kinds=definite,possible \
                --suppressions="${SUPPRESSION_FILE}" \
                unittests/CppInterOp/bin/${{ env.BUILD_TYPE }}/CppInterOpTests
            else
              valgrind --show-error-list=yes --track-origins=yes --error-exitcode=1 \
                --show-leak-kinds=definite,possible \
                unittests/CppInterOp/bin/${{ env.BUILD_TYPE }}/CppInterOpTests
            fi
          fi
        fi
        echo "CB_PYTHON_DIR=$CB_PYTHON_DIR" >> $GITHUB_ENV
        echo "CPPINTEROP_BUILD_DIR=$CPPINTEROP_BUILD_DIR" >> $GITHUB_ENV
        echo "CPPINTEROP_DIR=$CPPINTEROP_DIR" >> $GITHUB_ENV
        echo "LLVM_BUILD_DIR=$LLVM_BUILD_DIR" >> $GITHUB_ENV

    - name: Build and Test/Install CppInterOp on Windows systems (native static library build)
      if: ${{ runner.os == 'Windows' && inputs.wasm != 'true' }}
      shell: powershell
      run: |
        $env:PWD_DIR= $PWD.Path

        # Mirrors the bash branch: setup-llvm's $LLVM_DIR is the cmake-
        # config dir, three levels deep from the install root.
        $env:LLVM_PREFIX = (Split-Path -Parent (Split-Path -Parent (Split-Path -Parent $env:LLVM_DIR)))
        $env:LLVM_BUILD_DIR="$env:LLVM_PREFIX"
        echo "LLVM_BUILD_DIR=$env:LLVM_BUILD_DIR" >> $env:GITHUB_ENV

        if ( "${{ inputs.cling }}" -imatch "On" )
        {
          $env:CLING_DIR="$env:LLVM_PREFIX"
          $env:CLING_CMAKE_DIR="$env:LLVM_PREFIX\lib\cmake\cling"
          echo "CLING_DIR=$env:CLING_DIR" >> $env:GITHUB_ENV
          echo "CLING_CMAKE_DIR=$env:CLING_CMAKE_DIR" >> $env:GITHUB_ENV
        }

        $env:CB_PYTHON_DIR="$env:PWD_DIR\cppyy-backend\python"
        echo "CB_PYTHON_DIR=$env:CB_PYTHON_DIR"
        echo "CB_PYTHON_DIR=$env:CB_PYTHON_DIR" >> $env:GITHUB_ENV

        $env:CPPINTEROP_DIR="$env:CB_PYTHON_DIR\cppyy-backend"
        echo "CPPINTEROP_DIR=$env:CPPINTEROP_DIR"
        echo "CPPINTEROP_DIR=$env:CPPINTEROP_DIR" >> $env:GITHUB_ENV

        # See bash site above re: stale build/ on local repro paths.
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        mkdir build
        cd build
        $env:CPPINTEROP_BUILD_DIR="$env:PWD_DIR"
        echo "CPPINTEROP_BUILD_DIR=$env:CPPINTEROP_BUILD_DIR"
        echo "CPPINTEROP_BUILD_DIR=$env:CPPINTEROP_BUILD_DIR" >> $env:GITHUB_ENV
        if ( "${{ inputs.cling }}" -imatch "On" )
        {
          cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}    `
                -DCPPINTEROP_USE_CLING=ON                                  `
                -DCPPINTEROP_USE_REPL=OFF                                  `
                -DCling_DIR="$env:CLING_CMAKE_DIR"   `
                -DLLVM_DIR="$env:LLVM_BUILD_DIR" `
                -DLLVM_ENABLE_WERROR=On                          `
                -DClang_DIR="$env:LLVM_BUILD_DIR"  -DCODE_COVERAGE=${{ env.CODE_COVERAGE }} -DCMAKE_INSTALL_PREFIX="$env:CPPINTEROP_DIR"  ..\
        }
        else
        {
          cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}    `
                -DLLVM_DIR="$env:LLVM_BUILD_DIR\lib\cmake\llvm"  `
                -DLLVM_ENABLE_WERROR=On                          `
                -DClang_DIR="$env:LLVM_BUILD_DIR\lib\cmake\clang"  -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}  -DCMAKE_INSTALL_PREFIX="$env:CPPINTEROP_DIR"  ..\
        }
        cmake --build . --config ${{ env.BUILD_TYPE }} --target check-cppinterop --parallel ${{ env.ncpus }}

    - name: Emscripten build of CppInterOp on Unix systems (shared library)
      if: ${{ runner.os != 'Windows' && inputs.wasm == 'true' }}
      shell: bash -l {0}
      run: |
        set -e
        ./emsdk/emsdk activate ${{ env.EMSDK_VER }}
        source ./emsdk/emsdk_env.sh
        micromamba create -f environment-wasm.yml --platform=emscripten-wasm32 -c https://prefix.dev/emscripten-forge-4x -c https://prefix.dev/conda-forge
        export SYSROOT_PATH=$PWD/emsdk/upstream/emscripten/cache/sysroot
        export PREFIX=$MAMBA_ROOT_PREFIX/envs/CppInterOp-wasm
        export CMAKE_PREFIX_PATH=$PREFIX
        export CMAKE_SYSTEM_PREFIX_PATH=$PREFIX

        # setup-recipe extracts the cell to $(pwd)/install/.
        LLVM_DIR="$(pwd)/install"
        LLVM_BUILD_DIR="$LLVM_DIR/build"

        # The cell ships host tblgens at install/native_build/; we still
        # need a CppInterOp-side host build to generate the cppinterop-
        # specific .inc files via cppinterop-tblgen.
        NATIVE_LLVM_BUILD_DIR="$LLVM_DIR/native_build"
        mkdir -p native_cppinterop_build && pushd native_cppinterop_build
        cmake -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_DIR=$NATIVE_LLVM_BUILD_DIR/lib/cmake/llvm \
              -DCPPINTEROP_ENABLE_TESTING=OFF \
              -DCMAKE_CXX_STANDARD=17 \
              -DLLVM_ENABLE_WERROR=On  \
              -DCPPINTEROP_BUILD_TABLEGEN_ONLY=ON \
              ../
        cmake --build . --target cppinterop-tblgen -j ${{ env.ncpus }}
        export CPPINTEROP_TBLGEN_EXE=$(find $PWD -name cppinterop-tblgen -type f | head -1)
        echo "Found cppinterop-tblgen at: $CPPINTEROP_TBLGEN_EXE"
        echo "CPPINTEROP_TBLGEN_EXE=$CPPINTEROP_TBLGEN_EXE" >> $GITHUB_ENV
        popd

        # Build CppInterOp next to cling and llvm-project.
        # See native-shared site above re: stale build/ on local repro.
        rm -rf build
        mkdir build
        cd build
        if [[ "${cling_on}" == "ON" ]]; then
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}        \
                -DCPPINTEROP_USE_CLING=ON                                  \
                -DCPPINTEROP_USE_REPL=OFF                                  \
                -DCMAKE_PREFIX_PATH=$PREFIX                     \
                -DCling_DIR=$LLVM_BUILD_DIR/tools/cling         \
                -DLLVM_DIR=$LLVM_BUILD_DIR/lib/cmake/llvm       \
                -DLLD_DIR=$LLVM_BUILD_DIR/lib/cmake/lld         \
                -DClang_DIR=$LLVM_BUILD_DIR/lib/cmake/clang     \
                -DBUILD_SHARED_LIBS=ON                          \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}        \
                -DCMAKE_INSTALL_PREFIX=$PREFIX         \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            \
                -DLLVM_ENABLE_WERROR=On                      \
                -DSYSROOT_PATH=$SYSROOT_PATH               \
                -DCPPINTEROP_TABLEGEN_EXE=$CPPINTEROP_TBLGEN_EXE \
                ../
        else
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}    \
                -DCMAKE_PREFIX_PATH=$PREFIX                      \
                -DLLVM_DIR=$LLVM_BUILD_DIR/lib/cmake/llvm       \
                -DLLD_DIR=$LLVM_BUILD_DIR/lib/cmake/lld         \
                -DClang_DIR=$LLVM_BUILD_DIR/lib/cmake/clang     \
                -DBUILD_SHARED_LIBS=ON                      \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}    \
                -DCMAKE_INSTALL_PREFIX=$PREFIX      \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            \
                -DLLVM_ENABLE_WERROR=On                      \
                -DSYSROOT_PATH=$SYSROOT_PATH                     \
                -DCPPINTEROP_TABLEGEN_EXE=$CPPINTEROP_TBLGEN_EXE \
                ../
        fi
        emmake make -j ${{ env.ncpus }} check-cppinterop
        os="${{ matrix.os }}"
        if [[ "${os}" != macos* ]] ; then
          actual_size=$(stat -c%s "./lib/libclangCppInterOp.so")
          max_size=$((50 * 1024 * 1024))
          if [[ "$actual_size" -gt "$max_size" ]]; then
            echo "Error: libclangCppInterOp.so is larger than 50 MB."
            exit 1
          fi
        fi
        cd ./unittests/CppInterOp/
        # Fresh install browsers, and run Emscripten tests in them
        # This is to match the Emscripten build instructions, where
        # we run in a fresh browser, to stop any extra installed
        # stuff interferring with the running of the tests
        # Explaination of options for emrun
        # --browser (name of browser on path)
        # --kill_exit makes it so that when emrun finishes,
        # that the headless browser we create is killed along with it
        # --timeout 60 is such that emrun is killed after 60 seconds if
        # still running. emrun should have finished long before then,
        # so if it is still running, something went wrong (such as a test
        # which crashed the html file). This will cause the ci to fail,
        # as a non 0 value of will be returned.
        # In the case of Chrome we have the extra --no-sandbox flag, as on
        # Ubuntu Chrome will refuse to run otherwise, as it expects to have
        # been installed with admin privileges. This flag allows it to run
        # in userspace.
        os="${{ matrix.os }}"
        if [[ "${os}" == "macos"* ]]; then
          # Install Firefox
          wget "https://download.mozilla.org/?product=firefox-latest&os=osx&lang=en-US" -O Firefox-latest.dmg
          hdiutil attach Firefox-latest.dmg
          cp -r /Volumes/Firefox/Firefox.app $PWD
          hdiutil detach /Volumes/Firefox
          cd ./Firefox.app/Contents/MacOS/
          export PATH="$PWD:$PATH"
          cd -

          # Install Google Chrome
          wget https://dl.google.com/chrome/mac/stable/accept_tos%3Dhttps%253A%252F%252Fwww.google.com%252Fintl%252Fen_ph%252Fchrome%252Fterms%252F%26_and_accept_tos%3Dhttps%253A%252F%252Fpolicies.google.com%252Fterms/googlechrome.pkg
          pkgutil --expand-full googlechrome.pkg google-chrome
          cd ./google-chrome/GoogleChrome.pkg/Payload/Google\ Chrome.app/Contents/MacOS/
          export PATH="$PWD:$PATH"
          cd -

          # Run tests in browsers
          echo "Running CppInterOpTests in Firefox"
          emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Firefox"
          emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
          echo "Running CppInterOpTests in Google Chrome"
          emrun --browser="Google Chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Google Chrome"          
          emrun --browser="Google Chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html
          sudo safaridriver --enable
          python -m pip install selenium
          echo "Running CppInterOpTests in Safari"
          emrun --no_browser --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html &
          python ../../../scripts/browser_tests_safari.py CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Safari"          
          emrun --no_browser --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html &
          python ../../../scripts/browser_tests_safari.py DynamicLibraryManagerTests.html
        else
          export ARCHITECHURE=$(uname -m)
          if [[ "$ARCHITECHURE" != "aarch64" ]]; then
            # Install Google Chrome
            wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            dpkg-deb -x google-chrome-stable_current_amd64.deb $PWD/chrome
            cd ./chrome/opt/google/chrome/
            export PATH="$PWD:$PATH"
            cd -

            # Install Firefox
            wget https://ftp.mozilla.org/pub/firefox/releases/138.0.1/linux-x86_64/en-GB/firefox-138.0.1.tar.xz
            tar -xJf firefox-138.0.1.tar.xz
            cd ./firefox
            export PATH="$PWD:$PATH"
            cd -

            # Run tests in browsers
            echo "Running CppInterOpTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
            echo "Running CppInterOpTests in Google Chrome"
            emrun --browser="google-chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Google Chrome"          
            emrun --browser="google-chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html
          else
            # Install Firefox
            wget https://ftp.mozilla.org/pub/firefox/releases/138.0.1/linux-aarch64/en-GB/firefox-138.0.1.tar.xz
            tar -xJf firefox-138.0.1.tar.xz
            cd ./firefox
            export PATH="$PWD:$PATH"
            cd -

            # Run tests in browsers
            echo "Running CppInterOpTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
          fi
        fi
        cd ../..
        emmake make -j ${{ env.ncpus }} install
        cd ..

        echo "PATH=$PATH" >> $GITHUB_ENV
        echo "SYSROOT_PATH=$SYSROOT_PATH" >> $GITHUB_ENV
        echo "CB_PYTHON_DIR=$CB_PYTHON_DIR" >> $GITHUB_ENV
        echo "CPPINTEROP_DIR=$CPPINTEROP_DIR" >> $GITHUB_ENV
        echo "LLVM_BUILD_DIR=$LLVM_BUILD_DIR" >> $GITHUB_ENV
        echo "PREFIX=$PREFIX" >> $GITHUB_ENV
  
    - name: Emscripten build of CppInterOp on Unix systems (static library)
      if: runner.os != 'Windows' && !(startsWith(matrix.os, 'ubuntu') && matrix.clang-runtime == '19' && endsWith(matrix.os, 'arm')) && inputs.wasm == 'true' && env.BUILD_STATIC_LIBRARY == 'On'
      shell: bash -l {0}
      run: |
        # FIXME: Static library builds, but tests fail to build on Github runner for Ubuntu arm llvm 19 case
        #        Disabled build for now
        set -e
        ./emsdk/emsdk activate ${{ env.EMSDK_VER }}
        source ./emsdk/emsdk_env.sh

        # Build CppInterOp next to cling and llvm-project.
        # See native-shared site above re: stale build/ on local repro.
        rm -rf build_static
        mkdir build_static
        cd build_static
        if [[ "${cling_on}" == "ON" ]]; then
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}        \
                -DCPPINTEROP_USE_CLING=ON                                  \
                -DCPPINTEROP_USE_REPL=OFF                                  \
                -DCMAKE_PREFIX_PATH=${{ env.PREFIX }}                    \
                -DCling_DIR=${{ env.LLVM_BUILD_DIR }}/tools/cling         \
                -DLLVM_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/llvm       \
                -DLLD_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/lld         \
                -DClang_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/clang     \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}        \
                -DCMAKE_INSTALL_PREFIX=${{ env.PREFIX }}         \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            \
                -DLLVM_ENABLE_WERROR=On                      \
                -DSYSROOT_PATH=${{ env.SYSROOT_PATH }}              \
                -DCPPINTEROP_TABLEGEN_EXE=$CPPINTEROP_TBLGEN_EXE \
                ../
        else
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}    \
                -DCMAKE_PREFIX_PATH=${{ env.PREFIX }}                      \
                -DLLVM_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/llvm       \
                -DLLD_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/lld         \
                -DClang_DIR=${{ env.LLVM_BUILD_DIR }}/lib/cmake/clang     \
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}    \
                -DCMAKE_INSTALL_PREFIX=${{ env.PREFIX }}     \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            \
                -DLLVM_ENABLE_WERROR=On                      \
                -DSYSROOT_PATH=${{ env.SYSROOT_PATH }}                  \
                -DCPPINTEROP_TABLEGEN_EXE=$CPPINTEROP_TBLGEN_EXE \
                ../
        fi
        os="${{ matrix.os }}"
        if [[ "${os}" != macos* ]] ; then
          EMCC_CORES=1 emmake make -j 1 check-cppinterop
        else
          emmake make -j ${{ env.ncpus }} check-cppinterop
        fi
        cd ./unittests/CppInterOp/
        os="${{ matrix.os }}"
        if [[ "${os}" == "macos"* ]]; then
          # Run tests in browsers
          echo "Running CppInterOpTests in Firefox"
          emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Firefox"
          emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
          echo "Running CppInterOpTests in Google Chrome"
          emrun --browser="Google Chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Google Chrome"          
          emrun --browser="Google Chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html
          echo "Running CppInterOpTests in Safari"
          emrun --no_browser --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html &
          python ../../../scripts/browser_tests_safari.py CppInterOpTests.html
          echo "Running DynamicLibraryManagerTests in Safari"          
          emrun --no_browser --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html &
          python ../../../scripts/browser_tests_safari.py DynamicLibraryManagerTests.html
        else
          export ARCHITECHURE=$(uname -m)
          if [[ "$ARCHITECHURE" != "aarch64" ]]; then
            # Run tests in browsers
            echo "Running CppInterOpTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
            echo "Running CppInterOpTests in Google Chrome"
            emrun --browser="google-chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Google Chrome"          
            emrun --browser="google-chrome" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html
          else
            # Run tests in browsers
            echo "Running CppInterOpTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html
            echo "Running DynamicLibraryManagerTests in Firefox"
            emrun --browser="firefox" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html
          fi
        fi
        cd ../../..

    - name: Emscripten build of CppInterOp on Windows systems (shared library)
      if: ${{ runner.os == 'Windows' && inputs.wasm == 'true' }}
      shell: powershell
      run: |
        micromamba create -f environment-wasm.yml --platform=emscripten-wasm32 -c https://prefix.dev/emscripten-forge-4x -c https://prefix.dev/conda-forge
        .\emsdk\emsdk activate ${{ env.EMSDK_VER }}
        .\emsdk\emsdk_env.ps1
        $env:PWD_DIR= $PWD.Path
        $env:SYSROOT_PATH="$env:EMSDK/upstream/emscripten/cache/sysroot"
        echo "SYSROOT_PATH=$env:SYSROOT_PATH"
        echo "SYSROOT_PATH=$env:SYSROOT_PATH" >> $env:GITHUB_ENV
        
        $env:PREFIX="$env:MAMBA_ROOT_PREFIX/envs/CppInterOp-wasm"
        echo "PREFIX=$env:PREFIX"
        echo "PREFIX=$env:PREFIX" >> $env:GITHUB_ENV
        
        $env:CMAKE_PREFIX_PATH=$env:PREFIX
        $env:CMAKE_SYSTEM_PREFIX_PATH=$env:PREFIX
        
        # setup-recipe extracts the cell to $PWD_DIR\install\.
        $env:LLVM_DIR="$env:PWD_DIR\install"
        echo "LLVM_DIR=$env:LLVM_DIR"
        echo "LLVM_DIR=$env:LLVM_DIR" >> $env:GITHUB_ENV

        $env:LLVM_BUILD_DIR="$env:LLVM_DIR\build"
        echo "LLVM_BUILD_DIR=$env:LLVM_BUILD_DIR"
        echo "LLVM_BUILD_DIR=$env:LLVM_BUILD_DIR" >> $env:GITHUB_ENV

        # Build native cppinterop-tblgen for .inc file generation.
        mkdir native_cppinterop_build
        pushd native_cppinterop_build
        $env:NATIVE_LLVM_BUILD_DIR="$env:LLVM_DIR\native_build"
        # Use -G Ninja explicitly: cmake's default on Windows is the
        # Visual Studio multi-config generator, which ignores
        # CMAKE_BUILD_TYPE and builds Debug, then fails to link against
        # the Release LLVM static libs produced by the native LLVM build.
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release `
              -DLLVM_DIR="$env:NATIVE_LLVM_BUILD_DIR\lib\cmake\llvm" `
              -DCPPINTEROP_ENABLE_TESTING=OFF `
              -DCMAKE_CXX_STANDARD=17 -DLLVM_ENABLE_WERROR=On `
              -DCPPINTEROP_BUILD_TABLEGEN_ONLY=ON `
              ..\
        cmake --build . --target cppinterop-tblgen -j ${{ env.ncpus }}
        $env:CPPINTEROP_TBLGEN_EXE = (Get-ChildItem -Recurse -Filter "cppinterop-tblgen.exe" | Select-Object -First 1).FullName
        echo "Found cppinterop-tblgen at: $env:CPPINTEROP_TBLGEN_EXE"
        echo "CPPINTEROP_TBLGEN_EXE=$env:CPPINTEROP_TBLGEN_EXE" >> $env:GITHUB_ENV
        popd

        # Build CppInterOp next to cling and llvm-project.
        # See bash sites above re: stale build/ on local repro paths.
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        mkdir build
        cd build
        if ( "${{ inputs.cling }}" -imatch "On" )
        {
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}        `
                -DCPPINTEROP_USE_CLING=ON                                  `
                -DCPPINTEROP_USE_REPL=OFF                                  `
                -DCMAKE_PREFIX_PATH="$env:PREFIX"                     `
                -DCling_DIR="$env:LLVM_BUILD_DIR\tools\cling"         `
                -DLLVM_DIR="$env:LLVM_BUILD_DIR\lib\cmake\llvm"        `
                -DLLD_DIR="$env:LLVM_BUILD_DIR\lib\cmake\lld"       `
                -DClang_DIR="$env:LLVM_BUILD_DIR\lib\cmake\clang"     `
                -DBUILD_SHARED_LIBS=ON                          `
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}        `
                -DCMAKE_INSTALL_PREFIX="$env:PREFIX"         `
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            `
                -DLLVM_ENABLE_WERROR=On                      `
                -DSYSROOT_PATH="$env:SYSROOT_PATH"              `
                -DCPPINTEROP_TABLEGEN_EXE="$env:CPPINTEROP_TBLGEN_EXE" `
                ..\
        }
        else
        {
          emcmake cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}    `
                -DCMAKE_PREFIX_PATH="$env:PREFIX"                      `
                -DLLVM_DIR="$env:LLVM_BUILD_DIR\lib\cmake\llvm"        `
                -DLLD_DIR="$env:LLVM_BUILD_DIR\lib\cmake\lld"        `
                -DClang_DIR="$env:LLVM_BUILD_DIR\lib\cmake\clang"    `
                -DBUILD_SHARED_LIBS=ON                      `
                -DCODE_COVERAGE=${{ env.CODE_COVERAGE }}    `
                -DCMAKE_INSTALL_PREFIX="$env:PREFIX"      `
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON            `
                -DLLVM_ENABLE_WERROR=On                      `
                -DSYSROOT_PATH="$env:SYSROOT_PATH"                     `
                -DCPPINTEROP_TABLEGEN_EXE="$env:CPPINTEROP_TBLGEN_EXE" `
                ..\
        }
        function Error-OnFailure {
          param (
              [Parameter(Mandatory)]
              [ScriptBlock]$Command
          )

         & $Command

         if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
         }
        }
        Error-OnFailure{ emmake make -j ${{ env.ncpus }} check-cppinterop }
        cd .\unittests\CppInterOp\
        Invoke-WebRequest -Uri "https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win/1411573/chrome-win.zip" -OutFile "$PWD\chrome-win.zip" -Verbose
        Expand-Archive -Path "$PWD\chrome-win.zip" -DestinationPath "$PWD" -Force -Verbose
        Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-latest-ssl&os=win64&lang=en-US" -OutFile "firefox-setup.exe" -Verbose
        & "C:\Program Files\7-Zip\7z.exe" x "firefox-setup.exe"
        $env:PATH="$PWD\core;$PWD\chrome-win;$env:PATH"
        echo "PATH=$env:PATH"
        echo "PATH=$env:PATH" >> $env:GITHUB_ENV
        echo "Running CppInterOpTests in Firefox"
        Error-OnFailure { emrun.bat --browser="firefox.exe" --kill_exit --timeout 60 --browser-args="--headless"  CppInterOpTests.html }
        echo "Running DynamicLibraryManagerTests in Firefox"
        Error-OnFailure { emrun.bat --browser="firefox.exe" --kill_exit --timeout 60 --browser-args="--headless"  DynamicLibraryManagerTests.html }
        echo "Running CppInterOpTests in Chromium"
        Error-OnFailure { emrun.bat --browser="chrome.exe" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  CppInterOpTests.html }
        echo "Running DynamicLibraryManagerTests in Chromium"
        Error-OnFailure { emrun.bat --browser="chrome.exe" --kill_exit --timeout 60 --browser-args="--headless --no-sandbox"  DynamicLibraryManagerTests.html }
        cd ..\..
        Error-OnFailure { emmake make -j ${{ env.ncpus }} install }
        echo "SYSROOT_PATH=$env:SYSROOT_PATH" >> $GITHUB_ENV
        echo "LLVM_BUILD_DIR=$env:LLVM_BUILD_DIR" >> $GITHUB_ENV
        echo "CPLUS_INCLUDE_PATH=$env:CPLUS_INCLUDE_PATH" >> $GITHUB_ENV
        echo "PREFIX=$env:PREFIX" >> $GITHUB_ENV

