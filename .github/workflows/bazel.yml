# Best-effort, non-gating Bazel build. CMake is the supported build for
# CppInterOp; this job must NEVER gate a PR (continue-on-error). The build/test
# steps run for real and surface a regression as a warning, not a false green.
#
# The cppyy sibling is cloned from the compiler-research default branch — it
# provides the cppyy_bazel module (cppyy/bazel/). That module is still landing
# across the four repos' Bazel PRs; until it merges this best-effort job may fail
# (non-gating). Cloning the default branch means no follow-up PR is needed once
# it does — the job goes green on its own.
name: bazel (best-effort)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bazel:
    name: bazel (best-effort) llvm${{ matrix.llvm }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        llvm: ["22"]
    steps:
      # No `path:` -> CppInterOp is $GITHUB_WORKSPACE; cppyy is cloned alongside
      # it so the local_path_override (../cppyy/bazel) resolves.
      - name: Checkout CppInterOp
        uses: actions/checkout@v4

      - name: Clone cppyy sibling (provides the cppyy_bazel module)
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth=1 \
            "https://github.com/compiler-research/cppyy.git"

      - name: Setup LLVM ${{ matrix.llvm }}
        uses: compiler-research/ci-workflows/actions/setup-llvm@main
        with:
          version: ${{ matrix.llvm }}
          os: ubuntu-24.04

      - name: Point LLVM_DIR at the tree root for the @llvm Bazel extension
        run: |
          # setup-llvm sets LLVM_DIR=<prefix>/lib/cmake/llvm (CMake convention);
          # the @llvm Bazel extension needs the tree root holding bin/llvm-config.
          echo "LLVM_DIR=${GITHUB_WORKSPACE}/install" >> "$GITHUB_ENV"

      - name: bazel build //...
        run: |
          bazelisk build //... \
            || echo "::warning::bazel build //... failed (best-effort, non-gating)"

      - name: bazel test //:tests
        run: |
          bazelisk test //:tests \
            || echo "::warning::bazel test //:tests failed (best-effort, non-gating)"
